name: Mobile CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate repository boundaries
        run: pnpm validate

      - name: Type check
        run: pnpm type-check

      - name: Build H5 verification target
        id: build
        continue-on-error: true
        shell: bash
        run: pnpm build:h5 > build-h5.log 2>&1

      - name: Upload H5 build diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-h5-log
          path: build-h5.log
          if-no-files-found: error

      - name: Fail when H5 build failed
        if: steps.build.outcome == 'failure'
        shell: bash
        run: |
          cat build-h5.log
          exit 1
