name: Mobile CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Upload generated lockfile
        uses: actions/upload-artifact@v4
        with:
          name: generated-pnpm-lock
          path: pnpm-lock.yaml
          if-no-files-found: error

      - name: Validate repository boundaries
        run: pnpm validate

      - name: Type check
        run: pnpm type-check

      - name: Build H5 verification target
        run: pnpm build:h5
