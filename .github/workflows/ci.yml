name: Mobile CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies and refresh lockfile
        id: install
        continue-on-error: true
        shell: bash
        run: pnpm install --no-frozen-lockfile --reporter=append-only > pnpm-install.log 2>&1

      - name: Upload install diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pnpm-refresh-log
          path: pnpm-install.log
          if-no-files-found: error

      - name: Fail when install failed
        if: steps.install.outcome == 'failure'
        shell: bash
        run: |
          tail -n 100 pnpm-install.log
          exit 1

      - name: Validate repository boundaries
        run: pnpm validate

      - name: Type check
        run: pnpm type-check

      - name: Build H5 verification target
        run: pnpm build:h5
