name: Mobile CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout source branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies and refresh lockfile
        run: pnpm install --no-frozen-lockfile

      - name: Commit refreshed lockfile through GitHub API
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          if git diff --quiet -- pnpm-lock.yaml; then
            echo "pnpm-lock.yaml is already current"
            exit 0
          fi
          python - <<'PY'
          import base64, json, os, subprocess
          from pathlib import Path
          branch = os.environ.get("GITHUB_HEAD_REF") or os.environ["GITHUB_REF_NAME"]
          current_sha = subprocess.check_output(
              ["git", "rev-parse", "HEAD:pnpm-lock.yaml"], text=True
          ).strip()
          payload = {
              "message": "chore: update pnpm lockfile",
              "content": base64.b64encode(Path("pnpm-lock.yaml").read_bytes()).decode("ascii"),
              "branch": branch,
              "sha": current_sha,
          }
          Path("lock-payload.json").write_text(json.dumps(payload), encoding="utf-8")
          PY
          curl --fail-with-body --silent --show-error \
            --request PUT \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/contents/pnpm-lock.yaml" \
            --data-binary @lock-payload.json

      - name: Validate repository boundaries
        run: pnpm validate

      - name: Type check
        run: pnpm type-check

      - name: Build H5 verification target
        run: pnpm build:h5
